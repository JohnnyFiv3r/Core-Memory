name: test

on:
  push:
    branches: ["**"]
    paths:
      - "core_memory/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "core_memory/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/test.yml"

jobs:
  core-only:
    name: "pytest (core deps only)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -x -q --tb=short

  full:
    name: "pytest (all extras)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[all,dev]"
      - run: pip install pytest-cov
      - run: pytest tests/ -x -q --tb=short --cov=core_memory --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  py310:
    name: "pytest (Python 3.10)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -x -q --tb=short

  neo4j-live:
    name: "pytest (Neo4j live integration)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,neo4j]"
      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            python -c "import neo4j; neo4j.GraphDatabase.driver('bolt://localhost:7687', auth=('neo4j','testpassword')).verify_connectivity(); print('Neo4j ready')" 2>/dev/null && break
            echo "Waiting for Neo4j ($i/30)..."
            sleep 3
          done
      - run: pytest tests/test_neo4j_live.py -v --tb=short -m neo4j
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword

name: openclaw-bridge-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'core_memory/integrations/**'
      - 'plugins/openclaw-core-memory-bridge/**'
      - 'scripts/openclaw_bridge_*'
      - 'docs/integrations/openclaw/**'

jobs:
  bridge-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run bridge synthetic smoke
        run: |
          chmod +x ./scripts/openclaw_bridge_ci_smoke.sh
          ./scripts/openclaw_bridge_ci_smoke.sh

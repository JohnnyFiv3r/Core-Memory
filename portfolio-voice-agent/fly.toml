# See https://fly.io/docs/reference/configuration/
app = "portfolio-voice-server"
primary_region = "ord"  # Chicago - change if you prefer

[build]

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

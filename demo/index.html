<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Memory — Live Demo</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2d3148;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c7eff;
    --accent-glow: rgba(108, 126, 255, 0.15);
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --cyan: #22d3ee;
    --radius: 8px;
    --font: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); }

  .header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .control-label {
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--font);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-right: 4px;
  }

  .control-select,
  .control-input {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 11px;
    min-height: 28px;
  }
  .control-select:focus,
  .control-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .control-inline {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .control-inline input[type="checkbox"] {
    accent-color: var(--accent);
  }

  .session-badge {
    font-family: var(--font);
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 12px;
  }

  .btn {
    font-size: 12px; font-weight: 500; padding: 6px 14px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); color: var(--text); cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); background: var(--accent-glow); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-accent:hover { opacity: 0.9; }
  .btn-warn { border-color: var(--amber); color: var(--amber); }
  .btn-warn:hover { background: rgba(251, 191, 36, 0.1); }

  .main { display: flex; flex: 1; overflow: hidden; }

  .chat-panel {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--border); min-width: 0;
  }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
  }
  .msg-user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 2px; }
  .msg-assistant { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
  .msg-system { align-self: center; background: transparent; border: 1px dashed var(--border); color: var(--text-dim); font-size: 12px; max-width: 100%; text-align: center; }
  .msg-meta { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  .chat-input-row {
    display: flex; gap: 8px; padding: 12px 20px;
    border-top: 1px solid var(--border); background: var(--surface);
  }

  .chat-input-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; color: var(--text);
    font-size: 14px; outline: none;
  }
  .chat-input-row input:focus { border-color: var(--accent); }
  .chat-input-row input::placeholder { color: var(--text-dim); }

  .inspector {
    width: 420px; display: flex; flex-direction: column;
    overflow: hidden; background: var(--surface);
  }

  .inspector-tabs {
    display: flex; border-bottom: 1px solid var(--border); background: var(--surface2);
  }

  .tab {
    flex: 1; padding: 10px 0; font-size: 12px; font-weight: 500;
    text-align: center; cursor: pointer; color: var(--text-dim);
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .inspector-body { flex: 1; overflow-y: auto; padding: 12px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .bead-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .bead-card:hover { border-color: var(--accent); }

  .bead-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

  .bead-type {
    font-family: var(--font); font-size: 10px; font-weight: 600;
    text-transform: uppercase; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.04em;
  }
  .bead-type-decision { background: rgba(108, 126, 255, 0.15); color: var(--accent); }
  .bead-type-lesson { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .bead-type-goal { background: rgba(251, 191, 36, 0.15); color: var(--amber); }
  .bead-type-evidence { background: rgba(34, 211, 238, 0.15); color: var(--cyan); }
  .bead-type-context { background: rgba(139, 143, 163, 0.15); color: var(--text-dim); }
  .bead-type-outcome { background: rgba(244, 114, 182, 0.15); color: #f472b6; }
  .bead-type-checkpoint { background: rgba(56, 189, 248, 0.15); color: #38bdf8; }
  .bead-type-process_flush { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }
  .bead-type-session_start { background: rgba(74, 222, 128, 0.12); color: var(--green); }
  .bead-type-session_end { background: rgba(248, 113, 113, 0.12); color: var(--red); }
  .bead-type-default { background: rgba(139, 143, 163, 0.1); color: var(--text-dim); }

  .bead-title { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bead-summary { font-size: 12px; color: var(--text-dim); line-height: 1.4; margin-top: 2px; }
  .bead-id { font-family: var(--font); font-size: 10px; color: var(--text-dim); margin-top: 4px; opacity: 0.6; }

  .bead-status { font-family: var(--font); font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: auto; }
  .status-open { background: rgba(56, 189, 248, 0.12); color: #38bdf8; }
  .status-default { background: rgba(139, 143, 163, 0.12); color: var(--text-dim); }
  .status-candidate { background: rgba(251, 191, 36, 0.12); color: var(--amber); }
  .status-promoted { background: rgba(74, 222, 128, 0.12); color: var(--green); }
  .status-archived { background: rgba(139, 143, 163, 0.12); color: var(--text-dim); }
  .status-conflict { background: rgba(248, 113, 113, 0.12); color: var(--red); }

  .runtime-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 12px;
    line-height: 1.4;
  }

  .assoc-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; margin-bottom: 6px; font-size: 12px;
  }
  .assoc-rel { font-family: var(--font); font-size: 10px; color: var(--cyan); font-weight: 600; text-transform: uppercase; }
  .assoc-beads { color: var(--text-dim); margin-top: 2px; font-family: var(--font); font-size: 10px; }
  .assoc-expl { color: var(--text); margin-top: 3px; }

  .rolling-item {
    display: flex; align-items: center; gap: 6px; padding: 6px 0;
    border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .rolling-item:last-child { border-bottom: none; }

  .stats-bar {
    display: flex; gap: 16px; padding: 8px 12px;
    border-top: 1px solid var(--border); font-family: var(--font);
    font-size: 11px; color: var(--text-dim);
  }
  .stat-val { color: var(--accent); font-weight: 600; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; width: 560px; max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { margin-bottom: 12px; font-size: 16px; }
  .modal pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px; font-family: var(--font);
    font-size: 12px; line-height: 1.5; overflow-x: auto; white-space: pre-wrap;
  }
  .modal .close-btn { float: right; cursor: pointer; color: var(--text-dim); font-size: 18px; background: none; border: none; }

  .typing {
    display: inline-flex; gap: 4px; padding: 10px 14px; align-self: flex-start;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; }
  .empty-state-icon { font-size: 24px; margin-bottom: 8px; }

  .budget-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); font-size: 11px;
  }
  .budget-label { color: var(--text-dim); font-weight: 500; white-space: nowrap; }
  .budget-track {
    flex: 1; height: 8px; background: var(--surface2);
    border-radius: 4px; overflow: hidden;
  }
  .budget-fill {
    height: 100%; width: 0%; border-radius: 4px;
    background: var(--accent); transition: width 0.4s, background 0.4s;
  }
  .budget-fill.warn { background: var(--amber); }
  .budget-fill.critical { background: var(--red); }
  .budget-text { color: var(--text-dim); font-family: var(--font); white-space: nowrap; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1><span>Core Memory</span> Live Demo</h1>
  <div class="header-controls">
    <span class="session-badge" id="session-badge">session: ---</span>
    <span class="control-label">subset</span>
    <select id="bench-subset" class="control-select" title="Benchmark subset">
      <option value="local" selected>local</option>
      <option value="full">full</option>
    </select>
    <span class="control-label">semantic</span>
    <select id="bench-semantic" class="control-select" title="Semantic mode">
      <option value="required" selected>required</option>
      <option value="degraded_allowed">degraded_allowed</option>
    </select>
    <span class="control-label">myelination</span>
    <select id="bench-myelination" class="control-select" title="Myelination mode">
      <option value="off" selected>off</option>
      <option value="on">on</option>
      <option value="compare">compare</option>
    </select>
    <span class="control-label">preload</span>
    <input id="bench-preload-max" class="control-input" type="number" min="0" step="50" value="200" style="width:74px" title="Max demo turns to preload">
    <label class="control-inline" title="Preload turns from demo session">
      <input id="bench-preload-enabled" type="checkbox">
      <span class="control-label" style="margin-right:0">from demo</span>
    </label>
    <button class="btn" onclick="seedMemory()">Seed</button>
    <button class="btn" id="btn-benchmark" onclick="runBenchmark()">Run LOCOMO Test</button>
    <button class="btn btn-warn" onclick="flushSession()">Flush Session</button>
  </div>
</header>

<div class="budget-bar">
  <div class="budget-label">Context Budget</div>
  <div class="budget-track">
    <div class="budget-fill" id="budget-fill"></div>
  </div>
  <div class="budget-text" id="budget-text">0 / 10,000 tokens</div>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Type a message..."
             onkeydown="if(event.key==='Enter')sendMessage()" autofocus>
      <button class="btn btn-accent" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="inspector">
    <div class="inspector-tabs">
      <div class="tab active" data-tab="beads" onclick="switchTab('beads')">Beads</div>
      <div class="tab" data-tab="associations" onclick="switchTab('associations')">Associations</div>
      <div class="tab" data-tab="claims" onclick="switchTab('claims')">Claims</div>
      <div class="tab" data-tab="runtime" onclick="switchTab('runtime')">Runtime</div>
      <div class="tab" data-tab="rolling" onclick="switchTab('rolling')">Rolling Window</div>
    </div>
    <div class="inspector-body">
      <div class="tab-content active" id="tab-beads"></div>
      <div class="tab-content" id="tab-associations"></div>
      <div class="tab-content" id="tab-claims"></div>
      <div class="tab-content" id="tab-runtime"></div>
      <div class="tab-content" id="tab-rolling"></div>
    </div>
    <div class="stats-bar">
      <span>Beads: <span class="stat-val" id="stat-beads">0</span></span>
      <span>Assoc: <span class="stat-val" id="stat-assoc">0</span></span>
      <span>Claims: <span class="stat-val" id="stat-claims">0</span></span>
      <span>Window: <span class="stat-val" id="stat-rolling">0</span></span>
      <span style="margin-left:auto">Ctx: <span class="stat-val" id="stat-tokens">0</span>/<span id="stat-budget">10000</span></span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3 id="modal-title">Bead Detail</h3>
    <pre id="modal-body"></pre>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('chat-input');

// Show initial empty state
function showEmptyChat() {
  messagesEl.textContent = '';
  const div = document.createElement('div');
  div.className = 'empty-state';
  const icon = document.createElement('p');
  icon.className = 'empty-state-icon';
  icon.textContent = '\u25C9';
  div.appendChild(icon);
  const line1 = document.createElement('p');
  line1.textContent = 'Send a message to start. The agent has persistent memory.';
  div.appendChild(line1);
  const line2 = document.createElement('p');
  line2.style.cssText = 'margin-top:4px; font-size:11px; color:var(--text-dim)';
  line2.textContent = 'Try: "What database are we using and why?"';
  div.appendChild(line2);
  messagesEl.appendChild(div);
}
showEmptyChat();

let firstMessage = true;

function addMsg(role, text, turnId) {
  if (firstMessage && role !== 'init') {
    messagesEl.textContent = '';
    firstMessage = false;
  }
  const div = document.createElement('div');
  div.className = 'msg msg-' + role;
  div.textContent = text;
  if (turnId) {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = turnId;
    div.appendChild(meta);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  for (let i = 0; i < 3; i++) {
    div.appendChild(document.createElement('span'));
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  addMsg('user', text);
  const typing = showTyping();
  inputEl.disabled = true;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });
    const data = await res.json();
    typing.remove();
    addMsg('assistant', data.response, data.turn_id);
    if (data.auto_flushed) {
      addMsg('system', 'Auto-flush triggered: context budget reached 80%. Session reset, rolling window rebuilt.');
    }
  } catch (err) {
    typing.remove();
    addMsg('assistant', 'Error: ' + err.message);
  }

  inputEl.disabled = false;
  inputEl.focus();
  refreshMemory();
}

function beadTypeClass(type) {
  const known = ['decision','lesson','goal','evidence','context','outcome','checkpoint','process_flush','session_start','session_end'];
  return known.includes(type) ? 'bead-type-' + type : 'bead-type-default';
}

function statusClass(status) {
  const known = ['open','default','candidate','promoted','archived','conflict'];
  return known.includes(status) ? 'status-' + status : 'status-default';
}

function renderBeads(beads) {
  const el = document.getElementById('tab-beads');
  el.textContent = '';
  if (!beads.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No beads yet';
    el.appendChild(empty);
    return;
  }
  beads.forEach(b => {
    const card = document.createElement('div');
    card.className = 'bead-card';
    card.addEventListener('click', () => showBead(b.id));

    const header = document.createElement('div');
    header.className = 'bead-header';

    const typeSpan = document.createElement('span');
    typeSpan.className = 'bead-type ' + beadTypeClass(b.type);
    typeSpan.textContent = b.type;
    header.appendChild(typeSpan);

    const titleSpan = document.createElement('span');
    titleSpan.className = 'bead-title';
    titleSpan.textContent = b.title;
    header.appendChild(titleSpan);

    const statusSpan = document.createElement('span');
    statusSpan.className = 'bead-status ' + statusClass(b.status);
    statusSpan.textContent = b.status;
    header.appendChild(statusSpan);

    card.appendChild(header);

    if (b.summary && b.summary.length) {
      const sumDiv = document.createElement('div');
      sumDiv.className = 'bead-summary';
      sumDiv.textContent = b.summary.join(' \u00B7 ');
      card.appendChild(sumDiv);
    }

    const idDiv = document.createElement('div');
    idDiv.className = 'bead-id';
    idDiv.textContent = b.id + ' \u00B7 ' + (b.source_turn_ids.join(', ') || 'no turn');
    card.appendChild(idDiv);

    el.appendChild(card);
  });
}

function renderAssociations(assocs) {
  const el = document.getElementById('tab-associations');
  el.textContent = '';
  if (!assocs.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No associations yet';
    el.appendChild(empty);
    return;
  }
  assocs.forEach(a => {
    const card = document.createElement('div');
    card.className = 'assoc-card';

    const rel = document.createElement('div');
    rel.className = 'assoc-rel';
    rel.textContent = a.relationship;
    card.appendChild(rel);

    const beads = document.createElement('div');
    beads.className = 'assoc-beads';
    beads.textContent = a.source_bead.slice(0, 16) + ' \u2192 ' + a.target_bead.slice(0, 16);
    card.appendChild(beads);

    if (a.explanation) {
      const expl = document.createElement('div');
      expl.className = 'assoc-expl';
      expl.textContent = a.explanation;
      card.appendChild(expl);
    }

    el.appendChild(card);
  });
}

function renderRolling(items) {
  const el = document.getElementById('tab-rolling');
  el.textContent = '';
  if (!items.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'Rolling window empty';
    el.appendChild(empty);
    return;
  }
  items.forEach(r => {
    const row = document.createElement('div');
    row.className = 'rolling-item';

    const typeSpan = document.createElement('span');
    typeSpan.className = 'bead-type ' + beadTypeClass(r.type);
    typeSpan.textContent = r.type;
    row.appendChild(typeSpan);

    const titleSpan = document.createElement('span');
    titleSpan.textContent = r.title;
    row.appendChild(titleSpan);

    el.appendChild(row);
  });
}

function renderClaims(rows) {
  const el = document.getElementById('tab-claims');
  el.textContent = '';
  if (!rows || !rows.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No claim-state slots yet';
    el.appendChild(empty);
    return;
  }
  rows.forEach(r => {
    const card = document.createElement('div');
    card.className = 'runtime-card';
    const status = r.status || 'not_found';
    card.innerHTML =
      '<div><strong>' + (r.slot_key || '-') + '</strong> ' +
      '<span class="bead-status ' + statusClass(status) + '">' + status + '</span></div>' +
      '<div style="margin-top:4px;color:var(--text-dim)">value: ' + String(r.value ?? '—') + '</div>' +
      '<div style="margin-top:2px;color:var(--text-dim)">confidence: ' + String(r.confidence ?? '—') +
      ' · conflicts: ' + String(r.conflict_count ?? 0) + '</div>';
    el.appendChild(card);
  });
}

function renderRuntime(runtime, probe) {
  const el = document.getElementById('tab-runtime');
  el.textContent = '';
  const q = runtime?.queue || {};
  const s = runtime?.semantic_backend || {};
  const p = probe || {};

  const c1 = document.createElement('div');
  c1.className = 'runtime-card';
  c1.innerHTML =
    '<div><strong>Async Queue</strong></div>' +
    '<div style="margin-top:4px;color:var(--text-dim)">pending: ' + String(q.pending_total ?? 0) +
    ' · processable: ' + String(q.processable_now ?? 0) + '</div>';
  el.appendChild(c1);

  const c2 = document.createElement('div');
  c2.className = 'runtime-card';
  c2.innerHTML =
    '<div><strong>Semantic Backend</strong></div>' +
    '<div style="margin-top:4px;color:var(--text-dim)">backend: ' + String(s.backend || 'unknown') +
    ' · usable: ' + String(!!s.usable_backend) + '</div>' +
    '<div style="margin-top:2px;color:var(--text-dim)">mode: ' + String(s.deployment_profile || 'n/a') + '</div>';
  el.appendChild(c2);

  const c3 = document.createElement('div');
  c3.className = 'runtime-card';
  c3.innerHTML =
    '<div><strong>Retrieval Probe</strong></div>' +
    '<div style="margin-top:4px;color:var(--text-dim)">ok: ' + String(!!p.ok) +
    ' · outcome: ' + String(p.answer_outcome || 'n/a') + '</div>' +
    '<div style="margin-top:2px;color:var(--text-dim)">surface: ' + String(p.top_source_surface || 'n/a') +
    ' · anchor: ' + String(p.top_anchor_reason || 'n/a') + '</div>';
  el.appendChild(c3);
}

async function refreshMemory() {
  try {
    const res = await fetch('/api/memory');
    const data = await res.json();
    renderBeads(data.beads);
    renderAssociations(data.associations);
    renderClaims(data.claim_state || []);
    renderRuntime(data.runtime || {}, data.retrieval_probe || {});
    renderRolling(data.rolling_window);
    document.getElementById('stat-beads').textContent = data.stats.total_beads;
    document.getElementById('stat-assoc').textContent = data.stats.total_associations;
    document.getElementById('stat-claims').textContent = data.stats.claim_slot_count || 0;
    document.getElementById('stat-rolling').textContent = data.stats.rolling_window_size;
    const usage = data.stats.token_usage || 0;
    const budget = data.stats.context_budget || 10000;
    const pct = Math.min(100, Math.round((usage / budget) * 100));
    document.getElementById('stat-tokens').textContent = usage;
    document.getElementById('stat-budget').textContent = budget;
    document.getElementById('session-badge').textContent = 'session: ' + data.stats.session_id;

    const fill = document.getElementById('budget-fill');
    fill.style.width = pct + '%';
    fill.className = 'budget-fill' + (pct >= 80 ? ' critical' : pct >= 50 ? ' warn' : '');
    document.getElementById('budget-text').textContent = usage.toLocaleString() + ' / ' + budget.toLocaleString() + ' tokens (' + pct + '%)';
  } catch (err) {
    console.error('refreshMemory failed:', err);
  }
}

async function showBead(id) {
  try {
    const res = await fetch('/api/bead/' + encodeURIComponent(id));
    const data = await res.json();
    document.getElementById('modal-title').textContent = data.title || 'Bead Detail';
    document.getElementById('modal-body').textContent = JSON.stringify(data, null, 2);
    document.getElementById('modal').classList.add('open');
  } catch (err) {
    alert('Failed to load bead: ' + err.message);
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function seedMemory() {
  try {
    const res = await fetch('/api/seed', {method: 'POST'});
    const data = await res.json();
    addMsg('system', 'Seeded ' + data.seeded + ' beads from project history');
    refreshMemory();
  } catch (err) {
    alert('Seed failed: ' + err.message);
  }
}

async function flushSession() {
  try {
    const res = await fetch('/api/flush', {method: 'POST'});
    const data = await res.json();
    addMsg('system',
      'Session flushed: ' + data.flushed_session + '\n' +
      'New session: ' + data.new_session + '\n' +
      'Rolling window: ' + data.rolling_window_beads + ' bead(s)'
    );
    refreshMemory();
  } catch (err) {
    alert('Flush failed: ' + err.message);
  }
}

function formatBenchmarkSummary(s) {
  if (!s) return 'Benchmark completed.';
  const modes = (s.backend_modes || []).join(', ') || 'unknown';
  return (
    'LOCOMO test completed\n' +
    'mode: isolated benchmark store (demo state not mutated)\n' +
    'cases: ' + (s.cases ?? 0) + '\n' +
    'pass/fail: ' + (s.pass ?? 0) + '/' + (s.fail ?? 0) + '\n' +
    'accuracy: ' + Number(s.accuracy || 0).toFixed(4) + '\n' +
    'semantic mode: ' + (s.semantic_mode || 'n/a') + '\n' +
    'backend modes: ' + modes + '\n' +
    'preload turns: ' + (s.preload_turn_count ?? 0)
  );
}

async function runBenchmark() {
  const btn = document.getElementById('btn-benchmark');
  if (!btn) return;
  const subset = document.getElementById('bench-subset')?.value || 'local';
  const semanticMode = document.getElementById('bench-semantic')?.value || 'required';
  const myelination = document.getElementById('bench-myelination')?.value || 'off';
  const preloadEnabled = !!document.getElementById('bench-preload-enabled')?.checked;
  const preloadRaw = Number(document.getElementById('bench-preload-max')?.value || 200);
  const preloadMax = Number.isFinite(preloadRaw) ? Math.max(0, Math.floor(preloadRaw)) : 200;

  const prev = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Running...';
  addMsg(
    'system',
    'Running LOCOMO benchmark (' + subset + ', semantic=' + semanticMode + ', myelination=' + myelination +
      ', preload=' + (preloadEnabled ? preloadMax : 0) + ')...'
  );
  try {
    const res = await fetch('/api/benchmark-run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        subset,
        semantic_mode: semanticMode,
        vector_backend: 'local-faiss',
        myelination,
        preload_from_demo: preloadEnabled,
        preload_turns_max: preloadMax,
      }),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      throw new Error(data.error || ('HTTP ' + res.status));
    }
    addMsg('system', formatBenchmarkSummary(data.summary || {}));
    document.getElementById('modal-title').textContent = 'LOCOMO Benchmark Report';
    document.getElementById('modal-body').textContent = JSON.stringify(data.report || {}, null, 2);
    document.getElementById('modal').classList.add('open');
  } catch (err) {
    addMsg('system', 'Benchmark failed: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = prev;
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-' + name));
}

refreshMemory();
setInterval(refreshMemory, 2500);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

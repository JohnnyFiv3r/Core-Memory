name: AIVoice
options:
  bundleIdPrefix: com.johnny5.aivoice
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  AIVoice:
    type: application
    platform: iOS
    sources:
      - path: AIVoice
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: AIVoiceWatch
        embed: true
    settings:
      base:
        INFOPLIST_FILE: AIVoice/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny5.aivoice
        PRODUCT_NAME: Clawdio
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: 1

  AIVoiceWatch:
    type: application
    platform: watchOS
    sources:
      - path: AIVoiceWatch
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: AIVoiceWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.johnny5.aivoice.watchkitapp
        PRODUCT_NAME: Clawdio
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
